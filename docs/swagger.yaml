  /reports/range:
    get:
      description: Returns total counts and sizes of media ingested within a date
        range. Dates must be in YYYYMMDD format.
      parameters:
      - description: Start date (YYYYMMDD)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYYMMDD)
        in: query
        name: end_date
        required: true
        type: string
      - description: Filter by repository ID (0 = all)
        in: query
        name: repository_id
        type: integer
      - description: Filter by refreshed status
        in: query
        name: is_refreshed
        type: boolean
