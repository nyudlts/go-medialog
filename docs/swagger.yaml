      security:
      - ApiKeyAuth: []
      summary: Get entry
      tags:
      - entries
  /entries/{id}/update:
    post:
      consumes:
      - application/json
      description: Replaces all updatable fields of an entry by UUID.
      parameters:
      - description: Entry UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated entry data
        in: body
        name: entry
        required: true
        schema:
          $ref: '#/definitions/models.Entry'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
