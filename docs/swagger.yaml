      security:
      - ApiKeyAuth: []
      summary: Update entry
      tags:
      - entries
  /entries/{id}/update_location:
    patch:
      description: Updates the storage location for a given entry by UUID.
      parameters:
      - description: Entry UUID
        in: path
        name: id
        required: true
        type: string
      - description: Storage location code
        in: query
        name: location
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Update entry location
      tags:
      - entries
  /logout:
    delete:
      description: Invalidates the current API token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "401":
