            type: object
      security:
      - ApiKeyAuth: []
      summary: List entries
      tags:
      - entries
    post:
      consumes:
      - application/json
      description: Creates a new media entry within an accession.
      parameters:
      - description: Entry data
        in: body
        name: entry
        required: true
        schema:
          $ref: '#/definitions/models.Entry'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Entry'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Create entry
      tags:
      - entries
  /entries/{id}:
    delete:
      description: Deletes a media entry by its UUID.
      parameters:
      - description: Entry UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete entry
      tags:
      - entries
    get:
      description: Returns a single media entry by its UUID.
      parameters:
      - description: Entry UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
