info:
  contact: {}
  description: REST API for managing digital media in archival collections.
  title: Go-Medialog API
  version: 0.1.5
paths:
  /:
    get:
      description: Returns version information about the application and API.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MedialogInfo'
      summary: API root
      tags:
      - root
  /accessions:
    get:
      description: Returns a list of all accessions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Accession'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: List accessions
      tags:
      - accessions
    post:
      consumes:
      - application/json
      description: Creates a new accession within a resource.
      parameters:
      - description: Accession data
        in: body
        name: accession
        required: true
        schema:
          $ref: '#/definitions/models.Accession'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Accession'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Create accession
      tags:
      - accessions
  /accessions/{id}:
    delete:
      description: Deletes an accession by its ID.
      parameters:
      - description: Accession ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete accession
      tags:
      - accessions
    get:
      description: Returns a single accession by its ID.
      parameters:
      - description: Accession ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Accession'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get accession
      tags:
      - accessions
  /accessions/{id}/entries:
    get:
      description: Returns paginated entries for a given accession. Use all_ids=true
        to return only entry UUIDs.
      parameters:
      - description: Accession ID
        in: path
        name: id
        required: true
        type: integer
      - description: Return all entry IDs (no pagination)
        in: query
        name: all_ids
        type: boolean
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Results per page (default 25)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.EntryResultSet'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get accession entries
      tags:
      - accessions
  /accessions/{id}/summary:
